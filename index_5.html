<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LUNAMOR">
<title>LUNAMOR HQ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; background: #fff; font-family: Georgia, serif; }

.wrap { padding: 2.8rem 2.2rem 3.5rem; }

.header { font-size: 11px; color: #bbb; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 0.4rem; }
.subheader { font-size: 15px; color: #888; margin-bottom: 2.2rem; font-style: italic; }

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2rem 1rem;
  margin-bottom: 0.8rem;
}

.discipline { display: flex; flex-direction: column; align-items: center; cursor: pointer; user-select: none; -webkit-user-select: none; }

.disc-wrap { position: relative; width: 17vw; height: 17vw; max-width: 80px; max-height: 80px; }
.disc-img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.18s; display: block; }
.disc-ring { position: absolute; inset: -4px; border-radius: 50%; border: 2px solid transparent; transition: border-color 0.18s; pointer-events: none; }
.discipline.active .disc-img { transform: scale(1.1); }
.discipline.active .disc-ring { border-color: #111; }

.disc-label { width: 100%; height: 9vw; max-height: 44px; display: flex; align-items: center; justify-content: center; margin-top: 0.5rem; }
.disc-label img { max-width: 20vw; max-height: 8vw; object-fit: contain; opacity: 0.3; transition: opacity 0.18s; }
.discipline.active .disc-label img { opacity: 1; }

.count { font-size: 11px; color: #ccc; text-align: right; margin-bottom: 1.4rem; font-style: italic; }
.divider { border: none; border-top: 1px solid #f0f0f0; margin: 1.6rem 0; }

.row { display: flex; gap: 1.4rem; margin-bottom: 1.4rem; flex-wrap: wrap; }
.field { flex: 1; min-width: 130px; }
.section-label { font-size: 10px; color: #bbb; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 0.5rem; }
.pills { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.pill { font-size: 13px; padding: 7px 16px; border-radius: 20px; border: 1px solid #e8e8e8; color: #888; cursor: pointer; transition: all 0.15s; background: transparent; font-family: Georgia, serif; }
.pill.active { background: #111; color: #fff; border-color: #111; }

.note-area { width: 100%; border: 1px solid #f0f0f0; border-radius: 10px; padding: 13px 16px; font-size: 14px; font-family: Georgia, serif; color: #111; background: transparent; resize: none; outline: none; margin-bottom: 1.4rem; line-height: 1.6; }
.note-area::placeholder { color: #ccc; font-style: italic; }

.generate-btn { width: 100%; padding: 16px; border-radius: 10px; border: 1.5px solid #111; background: transparent; color: #111; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; font-family: Georgia, serif; transition: all 0.2s; }
.generate-btn:active { background: #111; color: #fff; }

.output-box { margin-top: 1.2rem; padding: 1.4rem 1.6rem; border: 1px solid #f0f0f0; border-radius: 10px; font-size: 14px; color: #666; line-height: 1.9; white-space: pre-wrap; display: none; font-style: italic; }
.copy-btn { margin-top: 0.8rem; font-size: 11px; color: #bbb; background: none; border: none; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; font-family: Georgia, serif; padding: 0; display: none; }
</style>
</head>
<body>
<div class="wrap">

<div class="header">Lunamor HQ</div>
<div class="subheader">morning check-in — what are you alive to today?</div>

<div class="grid" id="disc-grid"></div>
<div class="count" id="count">tap to select</div>

<hr class="divider">

<div class="row">
  <div class="field">
    <div class="section-label">Energy</div>
    <div class="pills" id="energy">
      <div class="pill" onclick="pick(this,'energy')">low</div>
      <div class="pill active" onclick="pick(this,'energy')">medium</div>
      <div class="pill" onclick="pick(this,'energy')">high</div>
    </div>
  </div>
  <div class="field">
    <div class="section-label">Time</div>
    <div class="pills" id="time">
      <div class="pill" onclick="pick(this,'time')">15 min</div>
      <div class="pill active" onclick="pick(this,'time')">30–45</div>
      <div class="pill" onclick="pick(this,'time')">1–2 hrs</div>
      <div class="pill" onclick="pick(this,'time')">open</div>
    </div>
  </div>
</div>

<div class="field" style="margin-bottom:1.4rem">
  <div class="section-label">Lyn today</div>
  <div class="pills" id="lyn">
    <div class="pill active" onclick="pick(this,'lyn')">all good</div>
    <div class="pill" onclick="pick(this,'lyn')">needs attention</div>
    <div class="pill" onclick="pick(this,'lyn')">appointment</div>
    <div class="pill" onclick="pick(this,'lyn')">tricky day</div>
  </div>
</div>

<div class="section-label">Anything else on your mind?</div>
<textarea class="note-area" id="notes" rows="2" placeholder="deadline, decision, something weighing on you..."></textarea>

<button class="generate-btn" onclick="generate()">Generate morning prompt →</button>
<div class="output-box" id="output"></div>
<button class="copy-btn" id="copy-btn" onclick="copyPrompt()">copy to clipboard</button>

</div>

const NAMES  = [
  "tai chi",
  "clown secret",
  "sticking",
  "strumming",
  "writing",
  "body music",
  "the great learning",
  "low boy",
  "surf",
  "freedive",
  "booty shaker",
  "midi matt",
  "ethno jazz strings",
  "case unknown",
];


const active = new Set();
const grid = document.getElementById('disc-grid');

ICONS.forEach((iconSrc, i) => {
  const el = document.createElement('div');
  el.className = 'discipline';
  el.innerHTML = `<div class="disc-wrap"><img class="disc-img" src="${iconSrc}" alt="${NAMES[i]}"/><div class="disc-ring"></div></div><div class="disc-label"><img src="${LABELS[i]}" alt="${NAMES[i]}"/></div>`;
  el.onclick = () => {
    el.classList.toggle('active');
    const name = NAMES[i];
    active.has(name) ? active.delete(name) : active.add(name);
    document.getElementById('count').textContent = active.size === 0 ? 'tap to select' : active.size + ' selected';
  };
  grid.appendChild(el);
});

function pick(el, group) {
  document.querySelectorAll('#' + group + ' .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
}

function generate() {
  const energy = document.querySelector('#energy .pill.active')?.textContent || 'medium';
  const time   = document.querySelector('#time .pill.active')?.textContent   || '30-45';
  const lyn    = document.querySelector('#lyn .pill.active')?.textContent    || 'all good';
  const notes  = document.getElementById('notes').value.trim();
  const disciplines = [...active].join(', ') || 'nothing tapped yet';
  const lines = ['Morning HQ.','','Energy: '+energy,'Time available: '+time,'Lyn: '+lyn];
  if (notes) lines.push('On my mind: '+notes);
  lines.push('Alive to today: '+disciplines,'','What needs my attention?');
  const out = document.getElementById('output');
  out.style.display = 'block';
  out.textContent = lines.join('\n');
  document.getElementById('copy-btn').style.display = 'block';
}

function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('output').textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'copied ✓';
    setTimeout(() => btn.textContent = 'copy to clipboard', 2000);
  });
}
</script>
